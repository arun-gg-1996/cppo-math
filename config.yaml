extends: configs/cppo/cppo_g16_p0875.yaml

env:
  require_dotenv_file: true
  dotenv_path: .env

integrations:
  wandb:
    enabled: true
    api_key_env: WANDB_API_KEY
  hf_hub:
    enabled: true
    token_env: HF_TOKEN

model:
  model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  max_prompt_length: 512
  max_completion_length: 1024

lora:
  enabled: false

training:
  batch_size: 16
  gradient_accumulation_steps: 1
  generation_batch_size: 16
  num_iterations: 2

eval:
  temperature: 0.0
  top_p: 1.0
  batch_size: 256
  passk_profiles:
    enabled: true
  on_checkpoint:
    enabled: true
    run_at_start: true
    limit: 0
  boundary_eval:
    enabled: false
  mid_eval:
    enabled: false
    quick_local_enabled: false

artifacts:
  save_completions: false

reward:
  accuracy_weight: 1.0
  format_weight: 1.0
  accuracy_mode: cppo_gsm
  format_mode: cppo
  clip_to_unit: false
